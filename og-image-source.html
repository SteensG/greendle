<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  @import url('https://fonts.googleapis.com/css2?family=Raleway:wght@700;900&family=Inter:wght@400;500&display=swap');

  body {
    width: 1200px;
    height: 630px;
    background: #1C3A1C;
    font-family: 'Inter', sans-serif;
    position: relative;
    overflow: hidden;
  }

  /* Radial gradients for depth */
  .bg-layer {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 80% 80% at 80% 50%, rgba(46,107,46,0.55) 0%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 15% 80%, rgba(126,168,107,0.15) 0%, transparent 50%),
      radial-gradient(ellipse 40% 40% at 90% 10%, rgba(185,125,42,0.12) 0%, transparent 50%);
  }

  /* Grain texture */
  .grain {
    position: absolute; inset: 0;
    opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 256px 256px;
  }

  /* Decorative circle */
  .deco-circle {
    position: absolute;
    right: -80px; top: -80px;
    width: 520px; height: 520px;
    border-radius: 50%;
    border: 1px solid rgba(126,168,107,0.15);
  }
  .deco-circle-2 {
    position: absolute;
    right: 20px; top: -160px;
    width: 680px; height: 680px;
    border-radius: 50%;
    border: 1px solid rgba(126,168,107,0.08);
  }

  /* Right image panel */
  .image-panel {
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 480px;
    background: url('https://picsum.photos/seed/organicvegetablefarm/480/630') center/cover no-repeat;
  }
  .image-panel::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(to right, #1C3A1C 0%, rgba(28,58,28,0.3) 60%, transparent 100%);
  }

  /* Content */
  .content {
    position: absolute;
    left: 72px; top: 0; bottom: 0;
    width: 620px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 0;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 36px;
  }

  .logo-icon {
    width: 44px; height: 44px;
  }

  .logo-wordmark {
    font-family: 'Raleway', sans-serif;
    font-weight: 800;
    font-size: 26px;
    color: #F5EFE0;
    letter-spacing: -0.02em;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(126,168,107,0.18);
    border: 1px solid rgba(126,168,107,0.35);
    border-radius: 100px;
    padding: 5px 14px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: #7EA86B;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 22px;
  }

  .badge::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #7EA86B;
  }

  h1 {
    font-family: 'Raleway', sans-serif;
    font-weight: 900;
    font-size: 68px;
    line-height: 1.0;
    letter-spacing: -0.03em;
    color: #F5EFE0;
    margin-bottom: 20px;
  }

  h1 em {
    font-style: normal;
    color: #7EA86B;
  }

  p {
    font-family: 'Inter', sans-serif;
    font-size: 18px;
    line-height: 1.6;
    color: rgba(245,239,224,0.7);
    margin-bottom: 36px;
    max-width: 440px;
  }

  .stat-row {
    display: flex;
    gap: 32px;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .stat-num {
    font-family: 'Raleway', sans-serif;
    font-weight: 800;
    font-size: 28px;
    color: #D4973E;
    letter-spacing: -0.02em;
  }

  .stat-label {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    color: rgba(245,239,224,0.5);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .divider {
    width: 1px;
    background: rgba(245,239,224,0.15);
    align-self: stretch;
  }
</style>
</head>
<body>
  <div class="bg-layer"></div>
  <div class="grain"></div>
  <div class="deco-circle"></div>
  <div class="deco-circle-2"></div>

  <div class="image-panel"></div>

  <div class="content">
    <div class="logo-row">
      <svg class="logo-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="64" height="64" rx="14" fill="rgba(245,239,224,0.1)"/>
        <path d="M32 48 L32 28" stroke="#7EA86B" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M32 28 C32 28 20 22 18 12 C18 12 28 10 34 18 C38 23 36 28 32 28Z" fill="#7EA86B"/>
        <path d="M32 36 C32 36 42 30 46 22 C46 22 38 19 34 26 C31 31 32 36 32 36Z" fill="#2E6B2E"/>
        <path d="M32 42 C32 42 24 38 22 32 C22 32 28 29 32 34 C34 37 32 42 32 42Z" fill="#7EA86B" opacity="0.7"/>
      </svg>
      <span class="logo-wordmark">Greendle</span>
    </div>

    <div class="badge">Farm to door · Guilt free</div>

    <h1>Eat well.<br><em>Do good.</em></h1>

    <p>Seasonal meal kits & groceries from certified organic farms, delivered carbon-neutral to your door.</p>

    <div class="stat-row">
      <div class="stat">
        <span class="stat-num">40+</span>
        <span class="stat-label">Partner farms</span>
      </div>
      <div class="divider"></div>
      <div class="stat">
        <span class="stat-num">100%</span>
        <span class="stat-label">Zero-waste packaging</span>
      </div>
      <div class="divider"></div>
      <div class="stat">
        <span class="stat-num">Net-zero</span>
        <span class="stat-label">Carbon delivery</span>
      </div>
    </div>
  </div>
</body>
</html>
